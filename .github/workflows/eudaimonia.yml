name: Eudaimonia Filter

on:
  schedule:
    # Run 4x daily: 6am, 12pm, 6pm, midnight UTC
    - cron: "0 12 * * *"
  workflow_dispatch: # Allow manual triggers

permissions:
  contents: write

jobs:
  filter:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Eudaimonia Filter
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          RSS_FEEDS: ${{ vars.RSS_FEEDS || '["https://www.theguardian.com/us-news/rss","https://www.theguardian.com/world/rss","https://www.pbs.org/newshour/feeds/rss/headlines","https://www.propublica.org/feeds/propublica/main"]' }}
          SCORE_THRESHOLD: ${{ vars.SCORE_THRESHOLD || '7' }}
          MAX_ENTRIES_PER_FEED: ${{ vars.MAX_ENTRIES_PER_FEED || '25' }}
          BATCH_SIZE: ${{ vars.BATCH_SIZE || '10' }}
          FEED_RETENTION_DAYS: ${{ vars.FEED_RETENTION_DAYS || '7' }}
        run: python eudaimonia_filter.py

      - name: Commit and push updated feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/feed.xml data/seen.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update eudaimonia feed [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
